name: Deploy Multi-Provider AI to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      deploy_type:
        description: 'Deployment type'
        required: true
        default: 'full'
        type: choice
        options:
        - full
        - backend-only
        - frontend-only
        - migration-only

env:
  NODE_VERSION: '18.x'
  PYTHON_VERSION: '3.11'

jobs:
  pre-deployment-check:
    runs-on: ubuntu-latest
    outputs:
      should-deploy-backend: ${{ steps.changes.outputs.backend }}
      should-deploy-frontend: ${{ steps.changes.outputs.frontend }}
      
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2
        
    - name: Check for changes
      id: changes
      run: |
        if [ "${{ github.event.inputs.deploy_type }}" = "full" ] || [ "${{ github.event.inputs.deploy_type }}" = "" ]; then
          echo "backend=true" >> $GITHUB_OUTPUT
          echo "frontend=true" >> $GITHUB_OUTPUT
        elif [ "${{ github.event.inputs.deploy_type }}" = "backend-only" ]; then
          echo "backend=true" >> $GITHUB_OUTPUT
          echo "frontend=false" >> $GITHUB_OUTPUT
        elif [ "${{ github.event.inputs.deploy_type }}" = "frontend-only" ]; then
          echo "backend=false" >> $GITHUB_OUTPUT
          echo "frontend=true" >> $GITHUB_OUTPUT
        else
          # Check for actual changes
          if git diff --name-only HEAD~1 | grep -q "^backend/"; then
            echo "backend=true" >> $GITHUB_OUTPUT
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi
          
          if git diff --name-only HEAD~1 | grep -q "^frontend/"; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi
        fi
    
    - name: System Health Check
      run: |
        echo "🔍 Checking production system health..."
        
        # Backend health check
        if curl -f --max-time 10 ${{ secrets.BACKEND_URL }}/health; then
          echo "✅ Backend is healthy"
        else
          echo "⚠️ Backend health check failed - proceeding with caution"
        fi
        
        # Frontend health check
        if curl -f --max-time 10 ${{ secrets.FRONTEND_URL }}; then
          echo "✅ Frontend is accessible"
        else
          echo "⚠️ Frontend accessibility check failed"
        fi

  database-migration:
    runs-on: ubuntu-latest
    needs: pre-deployment-check
    if: needs.pre-deployment-check.outputs.should-deploy-backend == 'true' || github.event.inputs.deploy_type == 'migration-only'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        pip install -r backend/requirements.txt
    
    - name: Database Migration Dry Run
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        echo "🗄️ Testing database migration..."
        cd backend
        python migrations/phase_2f_multi_provider_migration.py --dry-run
    
    - name: Create Database Backup
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      run: |
        echo "💾 Creating database backup..."
        # Install Railway CLI
        npm install -g @railway/cli
        # Create backup (Railway handles this automatically in prod)
        echo "Database backup initiated"
    
    - name: Run Database Migration
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        echo "🚀 Running production database migration..."
        cd backend
        python migrations/phase_2f_multi_provider_migration.py --production
    
    - name: Validate Migration
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        echo "✅ Validating migration success..."
        cd backend
        python -c "
        import asyncio
        from models.lecture_orm import engine
        from sqlalchemy import text
        
        async def validate():
            async with engine.begin() as conn:
                result = await conn.execute(text('SELECT COUNT(*) FROM user_ai_preferences'))
                print(f'UserAIPreferences table accessible: {result.scalar() >= 0}')
                
                result = await conn.execute(text('SELECT COUNT(*) FROM ai_provider_config'))  
                print(f'AIProviderConfig table accessible: {result.scalar() >= 0}')
                
        asyncio.run(validate())
        "

  deploy-backend:
    runs-on: ubuntu-latest
    needs: [pre-deployment-check, database-migration]
    if: always() && needs.pre-deployment-check.outputs.should-deploy-backend == 'true' && (needs.database-migration.result == 'success' || needs.database-migration.result == 'skipped')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to Railway
      uses: bervProject/railway-deploy@main
      with:
        railway_token: ${{ secrets.RAILWAY_TOKEN }}
        service: 'backend'
    
    - name: Wait for Deployment
      run: |
        echo "⏳ Waiting for backend deployment..."
        sleep 45  # Allow time for Railway deployment
    
    - name: Backend Health Check
      run: |
        echo "🔍 Validating backend deployment..."
        max_attempts=10
        attempt=1
        
        while [ $attempt -le $max_attempts ]; do
          if curl -f --max-time 30 ${{ secrets.BACKEND_URL }}/health; then
            echo "✅ Backend health check passed"
            break
          else
            echo "⏳ Attempt $attempt failed, retrying in 30s..."
            sleep 30
            attempt=$((attempt + 1))
          fi
        done
        
        if [ $attempt -gt $max_attempts ]; then
          echo "❌ Backend health check failed after $max_attempts attempts"
          exit 1
        fi
    
    - name: Multi-Provider API Validation
      run: |
        echo "🤖 Testing Multi-Provider AI endpoints..."
        
        # Test provider status endpoint
        if curl -f --max-time 10 "${{ secrets.BACKEND_URL }}/api/multi-provider/provider-status"; then
          echo "✅ Provider status endpoint working"
        else
          echo "❌ Provider status endpoint failed"
          exit 1
        fi
        
        # Test cost analysis endpoint
        if curl -f --max-time 15 -X POST "${{ secrets.BACKEND_URL }}/api/multi-provider/analyze-costs" \
           -H "Content-Type: application/json" \
           -d '{"topic":"test","duration":10,"difficulty":"beginner","quality_tier":"standard"}'; then
          echo "✅ Cost analysis endpoint working"
        else
          echo "❌ Cost analysis endpoint failed"
          exit 1
        fi

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [pre-deployment-check, deploy-backend]
    if: always() && needs.pre-deployment-check.outputs.should-deploy-frontend == 'true' && (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Frontend Build Test
      run: |
        echo "🏗️ Testing frontend build..."
        npm run build
    
    - name: Install Vercel CLI
      run: npm install --global vercel@latest
    
    - name: Pull Vercel Environment Information
      run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
    
    - name: Build Project Artifacts
      run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
    
    - name: Deploy Project Artifacts to Vercel
      run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
    
    - name: Frontend Health Check
      run: |
        echo "🔍 Validating frontend deployment..."
        max_attempts=5
        attempt=1
        
        while [ $attempt -le $max_attempts ]; do
          if curl -f --max-time 30 ${{ secrets.FRONTEND_URL }}; then
            echo "✅ Frontend accessibility check passed"
            break
          else
            echo "⏳ Attempt $attempt failed, retrying in 15s..."
            sleep 15
            attempt=$((attempt + 1))
          fi
        done
        
        if [ $attempt -gt $max_attempts ]; then
          echo "❌ Frontend accessibility check failed"
          exit 1
        fi

  integration-testing:
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always() && (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') && (needs.deploy-frontend.result == 'success' || needs.deploy-frontend.result == 'skipped')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: End-to-End Integration Test
      env:
        BACKEND_URL: ${{ secrets.BACKEND_URL }}
        FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
      run: |
        echo "🧪 Running integration tests..."
        
        # Test full user flow
        echo "Testing user registration flow..."
        response=$(curl -s -X POST "$BACKEND_URL/api/auth/register" \
          -H "Content-Type: application/json" \
          -d '{"email":"test-deploy@example.com","password":"testpass123","confirm_password":"testpass123","full_name":"Deploy Test"}')
        
        if echo "$response" | grep -q "access_token"; then
          echo "✅ User registration test passed"
        else
          echo "❌ User registration test failed"
          echo "Response: $response"
          exit 1
        fi
        
        # Extract token for further tests
        token=$(echo "$response" | grep -o '"access_token":"[^"]*"' | sed 's/"access_token":"//' | sed 's/"//')
        
        # Test multi-provider dashboard
        echo "Testing multi-provider dashboard..."
        if curl -f -H "Authorization: Bearer $token" "$BACKEND_URL/api/multi-provider/dashboard"; then
          echo "✅ Multi-provider dashboard test passed"
        else
          echo "❌ Multi-provider dashboard test failed"
          exit 1
        fi
    
    - name: Performance Test
      env:
        BACKEND_URL: ${{ secrets.BACKEND_URL }}
      run: |
        echo "⚡ Running performance tests..."
        
        # Test API response times
        start_time=$(date +%s)
        curl -f --max-time 30 "$BACKEND_URL/api/multi-provider/provider-status"
        end_time=$(date +%s)
        response_time=$((end_time - start_time))
        
        if [ $response_time -lt 10 ]; then
          echo "✅ Provider status response time: ${response_time}s (target: <10s)"
        else
          echo "⚠️ Provider status response time: ${response_time}s (slower than target)"
        fi

  deployment-notification:
    runs-on: ubuntu-latest
    needs: [pre-deployment-check, database-migration, deploy-backend, deploy-frontend, integration-testing]
    if: always()
    
    steps:
    - name: Deployment Summary
      run: |
        echo "🚀 Multi-Provider AI Deployment Summary"
        echo "======================================"
        
        # Check results
        backend_status="${{ needs.deploy-backend.result }}"
        frontend_status="${{ needs.deploy-frontend.result }}"
        migration_status="${{ needs.database-migration.result }}"
        integration_status="${{ needs.integration-testing.result }}"
        
        echo "Database Migration: $migration_status"
        echo "Backend Deployment: $backend_status"  
        echo "Frontend Deployment: $frontend_status"
        echo "Integration Tests: $integration_status"
        
        # Overall status
        if [[ "$backend_status" == "success" && "$frontend_status" == "success" && "$integration_status" == "success" ]]; then
          echo ""
          echo "✅ DEPLOYMENT SUCCESSFUL!"
          echo "🤖 Multi-Provider AI system is live"
          echo "💰 Cost optimization features active"
          echo "🔧 Provider monitoring operational"
          echo ""
          echo "Production URLs:"
          echo "Backend: ${{ secrets.BACKEND_URL }}"
          echo "Frontend: ${{ secrets.FRONTEND_URL }}"
          echo "API Docs: ${{ secrets.BACKEND_URL }}/docs"
        else
          echo ""
          echo "❌ DEPLOYMENT FAILED!"
          echo "Please check the failed jobs above"
          exit 1
        fi
    
    - name: Deploy Project Artifacts to Vercel
      run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
      working-directory: ./frontend

  notify:
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()
    
    steps:
    - name: Deployment Status
      run: |
        if [[ "${{ needs.deploy-backend.result }}" == "success" && "${{ needs.deploy-frontend.result }}" == "success" ]]; then
          echo "✅ Deployment successful!"
        else
          echo "❌ Deployment failed!"
          exit 1
        fi
