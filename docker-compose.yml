

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - HOST=0.0.0.0
      - PORT=8000
      - MOCK_MODE=true
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/learnonthego
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-only-jwt-secret}
      - ENCRYPTION_MASTER_KEY=${ENCRYPTION_MASTER_KEY:-dev-only-encryption-key-32chars}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-demo}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-demo}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-demo}
      - AI_SERVICES_ENABLED=true
      - PDF_PROCESSING_ENABLED=true
      - TTS_ENABLED=true
      - ENCRYPTION_ENABLED=true
    volumes:
      - ./backend:/app
      - backend_cache:/root/.cache
      - backend_uploads:/app/temp_uploads
      - backend_audio:/app/temp_audio
    depends_on:
      - db
      - redis
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=learnonthego
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  backend_cache:
  backend_uploads:
  backend_audio:

networks:
  default:
    name: learnonthego_network
